services:
  - type: web
    name: upcomrw-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: upcomrw-db
          property: connectionString

  - type: static_site
    name: upcomrw-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: upcomrw-backend
          property: url

databases:
  - name: upcomrw-db
    plan: free
    databaseName: tutoring_db
